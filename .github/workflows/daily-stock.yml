name: Daily stock market post

on:
  schedule:
    # 09:00 JST, Tuesday-Saturday.
    - cron: "0 0 * * 2-6"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: stock-post

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Post market summary to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          GEMINI_FALLBACK_MODELS: ${{ vars.GEMINI_FALLBACK_MODELS }}
          GEMINI_TIMEOUT_SECONDS: ${{ vars.GEMINI_TIMEOUT_SECONDS }}
          STOCK_CONFIG_PATH: stocks.yml
          EVENT_CONFIG_PATH: market_events.yml
          EVENT_LOOKBACK_DAYS: ${{ vars.EVENT_LOOKBACK_DAYS }}
          EVENT_LOOKAHEAD_DAYS: ${{ vars.EVENT_LOOKAHEAD_DAYS }}
        run: python main.py
